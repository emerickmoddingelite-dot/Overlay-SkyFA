<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SkyFA Overlay — Fin de Live</title>
<link rel="stylesheet" href="shared.css">
<style>

/* ── VIGNETTE ── */
.vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 25%,
    rgba(0,0,0,0.5) 75%,
    rgba(0,0,0,0.92) 100%
  );
  pointer-events: none;
}

/* ── TOP BANNER ── */
.top-banner {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(180deg, rgba(0,0,0,0.88) 0%, transparent 100%);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 1s 0.2s both;
}
.top-banner-text {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 9px;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* ── SCENE ── */
.scene {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ── OUTRO SYMBOL ── */
.outro-symbol {
  font-size: 52px;
  margin-bottom: 18px;
  filter: drop-shadow(0 0 24px rgba(2,217,249,0.5));
  animation: fadeInScale 1.4s var(--ease-out-expo) 0.2s both;
}

/* ── EYEBROW ── */
.fin-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 10px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 14px;
  animation: fadeIn 1s 0.4s both;
}

/* ── TITLE ── */
.fin-title {
  font-family: var(--font-display);
  font-size: 100px;
  font-weight: 900;
  line-height: 0.88;
  letter-spacing: 5px;
  text-transform: uppercase;
  background: linear-gradient(180deg,
    #ffffff 0%,
    #e0feff 10%,
    var(--cyan) 34%,
    var(--cyan-mid) 62%,
    var(--cyan-dark) 84%,
    #001015 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 50px rgba(2,217,249,0.45)) drop-shadow(0 6px 14px rgba(0,0,0,0.95));
  margin-bottom: 24px;
  animation: fadeInScale 1.2s var(--ease-out-expo) 0.2s both;
}

.deco-fin {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 18px;
  animation: fadeIn 1s 0.7s both;
}
.deco-fin-arm { height: 1px; width: 190px; }
.deco-fin-arm.l { background: linear-gradient(90deg, transparent, var(--border-mid)); }
.deco-fin-arm.r { background: linear-gradient(90deg, var(--border-mid), transparent); }
.deco-fin-gem { width: 9px; height: 9px; background: var(--cyan); transform: rotate(45deg); box-shadow: 0 0 12px var(--cyan-glow); }

.fin-sub {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 7px;
  text-transform: uppercase;
  color: var(--text-cyan);
  opacity: 0.8;
  margin-bottom: 10px;
  animation: fadeInUp 1s 0.8s both;
}

.fin-message {
  font-family: var(--font-ui);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 2px;
  color: var(--text-dim);
  margin-bottom: 36px;
  animation: fadeInUp 1s 0.95s both;
}

/* ── CTA ── */
.fin-cta {
  display: inline-flex; align-items: center; gap: 16px;
  padding: 14px 44px;
  border: 1px solid var(--border-mid);
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--cyan);
  animation: fadeInUp 1s 1.1s both, pulseGlow 3s 2.5s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}
.fin-cta::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(2,217,249,0.05), transparent);
  animation: shimmer 3s ease-in-out infinite;
}
.cta-diamond {
  width: 8px; height: 8px;
  background: var(--cyan-bright);
  transform: rotate(45deg);
  box-shadow: 0 0 10px var(--cyan-glow);
  flex-shrink: 0;
}

/* ── SOCIAL GRID ── */
.social-grid {
  position: absolute;
  bottom: 36px; left: 0; right: 0;
  display: flex;
  justify-content: center; align-items: center;
  gap: 0;
  animation: fadeInUp 1.2s 1.3s both;
}
.sg-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 0 44px;
}
.sg-sep {
  width: 1px; height: 30px;
  background: linear-gradient(180deg, transparent, var(--border-mid), transparent);
}
.sg-icon { font-size: 18px; opacity: 0.7; }
.sg-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
}
.sg-value {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text-cyan);
}

</style>
</head>
<body class="overlay">

<!-- Backgrounds -->
<div class="bg bg-base"></div>
<div class="bg-grid"></div>
<div class="vignette"></div>

<!-- Borders & corners -->
<div class="border-top"></div>
<div class="border-bottom"></div>
<div class="corners">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
</div>

<!-- Watermarks -->
<div class="watermark-l" data-cfg="overlays.debut.tagline">SkyFA • FiveM Roleplay</div>
<div class="watermark-r" data-cfg="overlays.debut.tagline">SkyFA • FiveM Roleplay</div>

<!-- Top banner -->
<div class="top-banner">
  <div class="top-banner-text" data-cfg="streamer.serveur">SkyFA — FiveM RP</div>
</div>

<!-- Center -->
<div class="scene">
  <div class="outro-symbol">🌐</div>
  <div class="fin-eyebrow" data-cfg="streamer.pseudo">SkyFA</div>

  <div class="fin-title" data-cfg="overlays.fin.titre">À BIENTÔT</div>

  <div class="deco-fin">
    <div class="deco-fin-arm l"></div>
    <div class="deco-fin-gem"></div>
    <div class="deco-fin-arm r"></div>
  </div>

  <div class="fin-sub" data-cfg="overlays.fin.sousTitre">Merci d'avoir regardé le live</div>
  <div class="fin-message" data-cfg="overlays.fin.message">On se retrouve très vite sur le serveur</div>

  <div class="fin-cta">
    <div class="cta-diamond"></div>
    <span data-cfg="overlays.fin.cta">Rejoins le Discord SkyFA !</span>
    <div class="cta-diamond"></div>
  </div>
</div>

<!-- Social grid -->
<div class="social-grid">
  <div class="sg-item">
    <span class="sg-icon">📺</span>
    <span class="sg-label">Twitch</span>
    <span class="sg-value" data-cfg="socials.twitch">twitch.tv/skyfa</span>
  </div>
  <div class="sg-sep"></div>
  <div class="sg-item">
    <span class="sg-icon">🎮</span>
    <span class="sg-label">Discord</span>
    <span class="sg-value" data-cfg="socials.discord">discord.gg/skyfa</span>
  </div>
  <div class="sg-sep"></div>
  <div class="sg-item">
    <span class="sg-icon">🐦</span>
    <span class="sg-label">Twitter</span>
    <span class="sg-value" data-cfg="socials.twitter">@skyfa</span>
  </div>
  <div class="sg-sep"></div>
  <div class="sg-item">
    <span class="sg-icon">▶</span>
    <span class="sg-label">YouTube</span>
    <span class="sg-value" data-cfg="socials.youtube">youtube.com/@skyfa</span>
  </div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
</body>
</html>
