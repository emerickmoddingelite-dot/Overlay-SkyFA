<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SkyFA Overlay — En Jeu</title>
<link rel="stylesheet" href="shared.css">
<style>

/* ── HUD TOP-LEFT : Streamer info ── */
.hud-tl {
  position: absolute;
  top: 22px; left: 22px;
  display: flex; flex-direction: column; gap: 0;
  animation: fadeInUp 0.8s var(--ease-out-expo) both;
}

.hud-nameplate {
  display: flex; align-items: center;
  gap: 14px;
  background: linear-gradient(90deg, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.45) 100%);
  border: 1px solid var(--border-mid);
  border-right: none;
  padding: 12px 18px;
  position: relative;
  min-width: 310px;
}
.hud-nameplate::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--cyan), var(--cyan-dark));
  box-shadow: 0 0 10px var(--cyan-glow);
}
.hud-avatar {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 900;
  color: var(--cyan);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.hud-avatar::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(2,217,249,0.15), transparent);
}
.hud-name {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--cyan);
  line-height: 1;
  letter-spacing: 2px;
  text-shadow: 0 0 16px var(--cyan-glow);
}
.hud-role {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 3px;
}

.hud-server {
  background: rgba(0,0,0,0.65);
  border: 1px solid var(--border);
  border-top: none;
  border-right: none;
  padding: 5px 18px 5px 54px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* ── HUD TOP-RIGHT : Objectif ── */
.hud-tr {
  position: absolute;
  top: 22px; right: 22px;
  min-width: 340px;
  animation: fadeInUp 0.8s 0.1s var(--ease-out-expo) both;
}

.obj-panel {
  background: linear-gradient(270deg, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.4) 100%);
  border: 1px solid var(--border-mid);
  border-left: none;
  position: relative;
}
.obj-panel::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--cyan-bright), rgba(2,217,249,0.3));
  box-shadow: 0 0 10px var(--cyan-glow);
}
.obj-header {
  padding: 7px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.obj-dot {
  width: 6px; height: 6px;
  background: var(--cyan-bright);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--cyan-glow);
  animation: blink 2s ease-in-out infinite;
}
.obj-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-dim);
  flex: 1;
}
.obj-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--cyan);
  opacity: 0.7;
  letter-spacing: 1px;
}
.obj-body {
  padding: 10px 18px;
}
.obj-line1 {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 1px;
  line-height: 1.3;
  text-shadow: 0 0 12px rgba(2,217,249,0.3);
}
.obj-line2 {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-cyan);
  letter-spacing: 1px;
  opacity: 0.75;
  margin-top: 2px;
}

/* ── HUD BOTTOM BAR ── */
.hud-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  display: flex;
  align-items: stretch;
  animation: fadeInUp 0.8s 0.2s var(--ease-out-expo) both;
}

.bottom-brand {
  display: flex; align-items: center;
  gap: 12px;
  background: rgba(0,0,0,0.85);
  border-top: 1px solid var(--border-mid);
  border-right: 1px solid var(--border);
  padding: 0 24px;
  min-width: 280px;
  position: relative;
}
.bottom-brand::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), transparent);
  box-shadow: 0 0 8px var(--cyan-glow);
}
.brand-icon {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 900;
  color: var(--cyan);
  text-shadow: 0 0 16px var(--cyan-glow);
  letter-spacing: -1px;
}
.brand-info {
  display: flex; flex-direction: column; gap: 1px;
}
.brand-name {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 1px;
}
.brand-url {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.bottom-socials {
  display: flex; align-items: center;
  gap: 0;
  background: rgba(0,0,0,0.7);
  border-top: 1px solid var(--border);
  flex: 1;
}

.social-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0 22px;
  height: 100%;
  border-right: 1px solid var(--border);
  position: relative;
}
.social-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: transparent;
  transition: background 0.3s;
}
.social-icon {
  font-size: 14px;
  opacity: 0.65;
}
.social-text {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-cyan);
  letter-spacing: 1px;
}

.bottom-clock {
  display: flex; align-items: center;
  padding: 0 22px;
  background: rgba(0,0,0,0.85);
  border-top: 1px solid var(--border-mid);
  border-left: 1px solid var(--border);
  position: relative;
}
.bottom-clock::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan));
  box-shadow: 0 0 8px var(--cyan-glow);
}
.clock-display {
  font-family: var(--font-mono);
  font-size: 18px;
  color: var(--cyan);
  letter-spacing: 2px;
  text-shadow: 0 0 14px var(--cyan-glow);
}

/* ── BOTTOM COMMANDS (top right above obj) ── */
.hud-commands {
  position: absolute;
  top: 130px; right: 22px;
  display: flex; flex-direction: column; gap: 4px;
  animation: fadeInUp 0.8s 0.25s var(--ease-out-expo) both;
}
.cmd-item {
  background: rgba(0,0,0,0.6);
  border: 1px solid var(--border);
  border-right: none;
  padding: 5px 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-align: right;
  position: relative;
}
.cmd-item::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--border-mid);
}

</style>
</head>
<body class="overlay">

<!-- Backgrounds -->
<!--<div class="bg bg-base"></div>
<div class="bg-grid"></div>-->

<!-- Borders & corners -->
<div class="border-top"></div>
<div class="border-bottom"></div>
<div class="corners">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
</div>

<!-- Watermarks -->
<div class="watermark-l" data-cfg="overlays.debut.tagline"></div>
<div class="watermark-r" data-cfg="overlays.debut.tagline"></div>

<!-- HUD TL : Identity -->
<div class="hud-tl">
  <div class="hud-nameplate">
    <div class="hud-avatar">
  <img src="https://i.ibb.co/SZxMM0F/Emerick-Modding-Elite-1.png" width="50" height="50" alt="avatar">
</div>
    <div>
      <div class="hud-name" data-cfg="streamer.pseudo">SkyFA</div>
      <div class="hud-role" data-cfg="streamer.role">Streamer / Admin</div>
    </div>
  </div>
  <div class="hud-server" data-cfg="streamer.serveur">SkyFA — FiveM RP</div>
</div>

<!-- HUD TR : Objectif -->
<div class="hud-tr">
  <div class="obj-panel">
    <div class="obj-header">
      <div class="obj-dot"></div>
      <span class="obj-label" data-cfg="overlays.enjeu.objectifTitre">Session en cours</span>
      <span class="obj-time" id="clock">--:--:--</span>
    </div>
    <div class="obj-body">
      <div class="obj-line1" data-cfg="overlays.enjeu.objectifLigne1">Roleplay FiveM</div>
      <div class="obj-line2" data-cfg="overlays.enjeu.objectifLigne2">Serveur : SkyFA RP</div>
    </div>
  </div>
</div>

<!-- Commandes -->
<div class="hud-commands">
  <div class="cmd-item" data-cfg="overlays.enjeu.commandes.0">!discord</div>
  <div class="cmd-item" data-cfg="overlays.enjeu.commandes.1">!serveur</div>
  <div class="cmd-item" data-cfg="overlays.enjeu.commandes.2">!social</div>
  <div class="cmd-item" data-cfg="overlays.enjeu.commandes.3">!commandes</div>
</div>

<!-- Bottom bar -->
<div class="hud-bottom">
    <div class="bottom-brand"><div class="brand-icon">
      <img src="https://i.ibb.co/SZxMM0F/Emerick-Modding-Elite-1.png" width="50" height="50" alt="icon">
    </div>
    <div class="brand-info">
      <div class="brand-name" data-cfg="streamer.pseudo">Twitch</div>
      <div class="brand-url" data-cfg="socials.twitch">twitch.tv/emerickmoddingelite</div>
    </div>
  </div>
  <div class="bottom-socials">
    <div class="social-item">
      <span class="social-icon">
        <img src="https://i.ibb.co/6QG6pKW/image.png" width="50" height="50" alt="icon">
      </span>
      <span class="social-text" data-cfg="socials.discord">discord.gg/skyfa</span>
    </div>
    <div class="social-item">
      <span class="social-icon">
        <img src="https://i.ibb.co/6QG6pKW/image.png" width="50" height="50" alt="icon">
      </span>
      <span class="social-text" data-cfg="socials.twitter">@skyfa</span>
    </div>
  </div>
  <div class="bottom-clock">
    <div class="clock-display" id="clock">--:--:--</div>
  </div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
</body>
</html>
