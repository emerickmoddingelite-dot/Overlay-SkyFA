<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SkyFA Overlay — Début de Live</title>
<link rel="stylesheet" href="shared.css">
<style>

/* ── LAYOUT ── */
.scene {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ── VERTICAL DATA STREAMS ── */
.data-stream {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  overflow: hidden;
  pointer-events: none;
  opacity: 0.35;
}
.data-stream::after {
  content: '';
  display: block;
  width: 100%;
  height: 200px;
  background: linear-gradient(180deg, transparent, var(--cyan), transparent);
  animation: dataStream 4s linear infinite;
}
.data-stream-l { left: 180px; animation-delay: 0s; }
.data-stream-r { right: 180px; animation-delay: 2s; }

/* ── SIDE ACCENT BARS ── */
.side-bar {
  position: absolute;
  top: 100px; bottom: 100px;
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--border-mid) 30%, var(--border-mid) 70%, transparent);
  animation: fadeIn 2s 0.5s both;
}
.side-bar-l { left: 180px; }
.side-bar-r { right: 180px; }

/* ── HORIZONTAL SCANLINE ── */
.scanline {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(2,217,249,0.06) 15%,
    rgba(2,217,249,0.22) 50%,
    rgba(2,217,249,0.06) 85%,
    transparent 100%
  );
  animation: scanline 7s linear infinite;
  pointer-events: none;
}

/* ── CENTER BLOCK ── */
.center {
  text-align: center;
  position: relative;
  z-index: 10;
  animation: fadeInScale 1.4s var(--ease-out-expo) 0.2s both;
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 22px;
  animation: fadeInUp 1s 0.5s both;
}

.main-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 96px;
  line-height: 0.9;
  letter-spacing: 4px;
  text-transform: uppercase;
  background: linear-gradient(180deg,
    #ffffff 0%,
    #e0feff 15%,
    var(--cyan) 40%,
    var(--cyan-mid) 65%,
    var(--cyan-dark) 85%,
    #001a20 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter:
    drop-shadow(0 0 55px rgba(2,217,249,0.5))
    drop-shadow(0 4px 12px rgba(0,0,0,0.95));
  margin-bottom: 28px;
  animation: fadeInUp 1s 0.3s both, glitch 8s 3s ease-in-out infinite;
}

.deco-row {
  display: flex; align-items: center; justify-content: center;
  gap: 18px; margin-bottom: 22px;
  animation: fadeIn 1s 0.8s both;
}
.deco-row-arm {
  height: 1px; width: 160px;
  background: linear-gradient(90deg, transparent, var(--cyan-dim));
}
.deco-row-arm.r { background: linear-gradient(90deg, var(--cyan-dim), transparent); }
.deco-row-gem {
  width: 8px; height: 8px;
  background: var(--cyan);
  transform: rotate(45deg);
  box-shadow: 0 0 12px var(--cyan-glow), 0 0 4px rgba(2,255,255,0.9);
}

.subtitle {
  font-family: var(--font-ui);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--text-cyan);
  opacity: 0.85;
  margin-bottom: 44px;
  animation: fadeInUp 1s 0.9s both;
}

/* ── LIVE BADGE ── */
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  padding: 12px 40px;
  border: 1px solid var(--border-mid);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--cyan);
  animation: fadeInUp 1s 1.1s both, pulseGlow 2.8s 2s ease-in-out infinite, borderFlash 6s 4s infinite;
  position: relative;
}
.live-badge::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(2,217,249,0.04), transparent);
  animation: shimmer 3s ease-in-out infinite;
}
.live-dot {
  width: 8px; height: 8px;
  background: #ff2244;
  border-radius: 50%;
  box-shadow: 0 0 10px #ff0033, 0 0 22px rgba(255,0,50,0.4);
  animation: blink 1s ease-in-out infinite;
}

/* ── SkyFA LOGO MONOGRAM ── */
.logo-mono {
  font-family: var(--font-display);
  font-size: 80px;
  font-weight: 900;
  color: transparent;
  -webkit-text-stroke: 1px rgba(2,217,249,0.25);
  position: absolute;
  user-select: none;
  pointer-events: none;
  animation: fadeIn 3s 0.5s both;
  letter-spacing: -4px;
}
.logo-mono-l { left: 240px; top: 50%; transform: translateY(-50%); }
.logo-mono-r { right: 240px; top: 50%; transform: translateY(-50%); }

/* ── INFO BAR ── */
.info-bar {
  position: absolute;
  bottom: 32px; left: 0; right: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0;
  animation: fadeInUp 1.2s 1.4s both;
}
.info-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 5px;
  padding: 0 50px;
}
.info-sep {
  width: 1px; height: 32px;
  background: linear-gradient(180deg, transparent, var(--border-mid), transparent);
}
.info-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-dim);
}
.info-value {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text-cyan);
}

/* ── BOTTOM GLOW ── */
.bottom-glow {
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 140px;
  background: radial-gradient(ellipse at 50% 100%, rgba(2,217,249,0.14) 0%, transparent 70%);
  pointer-events: none;
}

</style>
</head>
<body class="overlay">

<!-- Backgrounds -->
<div class="bg bg-base"></div>
<div class="bg-grid"></div>
<div class="scanline"></div>
<div class="bottom-glow"></div>

<!-- Borders & corners -->
<div class="border-top"></div>
<div class="border-bottom"></div>
<div class="corners">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
</div>

<!-- Watermarks -->
<div class="watermark-l" data-cfg="overlays.debut.tagline">SkyFA • FiveM Roleplay</div>
<div class="watermark-r" data-cfg="overlays.debut.tagline">SkyFA • FiveM Roleplay</div>

<!-- Logo monograms -->
<div class="logo-mono logo-mono-l">SKY</div>
<div class="logo-mono logo-mono-r">FA</div>

<!-- Side bars & data streams -->
<div class="side-bar side-bar-l"></div>
<div class="side-bar side-bar-r"></div>
<div class="data-stream data-stream-l"></div>
<div class="data-stream data-stream-r"></div>

<!-- Center content -->
<div class="scene">
  <div class="center">
    <div class="eyebrow">SkyFA • FiveM Roleplay</div>

    <div class="main-title" data-cfg="overlays.debut.titre">LE LIVE COMMENCE</div>

    <div class="deco-row">
      <div class="deco-row-arm"></div>
      <div class="deco-row-gem"></div>
      <div class="deco-row-arm r"></div>
    </div>

    <div class="subtitle" data-cfg="overlays.debut.sousTitre">Branche-toi, le RP commence</div>

    <div class="live-badge">
      <div class="live-dot"></div>
      <span data-cfg="overlays.debut.badge">EN DIRECT</span>
      <div class="live-dot"></div>
    </div>
  </div>
</div>

<!-- Info bar -->
<div class="info-bar">
  <div class="info-item">
    <span class="info-label">Serveur</span>
    <span class="info-value" data-cfg="streamer.serveur">SkyFA — FiveM RP</span>
  </div>
  <div class="info-sep"></div>
  <div class="info-item">
    <span class="info-label">Contenu</span>
    <span class="info-value" data-cfg="streamer.contenu">Roleplay FiveM</span>
  </div>
  <div class="info-sep"></div>
  <div class="info-item">
    <span class="info-label">Streamer</span>
    <span class="info-value" data-cfg="streamer.pseudo">SkyFA</span>
  </div>
  <div class="info-sep"></div>
  <div class="info-item">
    <span class="info-label">Rôle</span>
    <span class="info-value" data-cfg="streamer.role">Streamer / Admin</span>
  </div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
</body>
</html>
